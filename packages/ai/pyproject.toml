[project]
name = "audit-packs-ai"
version = "0.1.1"
description = "AI verification and confidence scoring for audit-packs"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = [
    "audit-packs-core>=0.1.1",
    "audit-packs-mapping>=0.1.1",
    "audit-packs-evidence>=0.1.1",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
ai = [
    "openai>=1.0",
    "anthropic>=0.20",
    "google-generativeai>=0.5",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
