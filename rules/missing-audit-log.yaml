rules:
  - id: missing-audit-log
    languages: [python]
    severity: WARNING
    message: >
      Sensitive operation performed without audit logging. Security-relevant
      actions (auth, privilege escalation, data access) must be logged to satisfy
      audit record content requirements (NIST AU-3 / SOC 2 CC7.2).
    patterns:
      - pattern-either:
          # Authentication without logging
          - patterns:
              - pattern: |
                  def $FUNC(...):
                      ...
                      $USER.authenticate(...)
                      ...
              - pattern-not: |
                  def $FUNC(...):
                      ...
                      logging.$METHOD(...)
                      ...
          # Password change without logging
          - patterns:
              - pattern: |
                  def $FUNC(...):
                      ...
                      $USER.set_password(...)
                      ...
              - pattern-not: |
                  def $FUNC(...):
                      ...
                      logging.$METHOD(...)
                      ...
          # Admin action without logging
          - patterns:
              - pattern: |
                  @$DECORATOR
                  def $FUNC(...):
                      ...
              - metavariable-regex:
                  metavariable: $DECORATOR
                  regex: '(admin_required|superuser_required|staff_required)'
              - pattern-not: |
                  @$DECORATOR
                  def $FUNC(...):
                      ...
                      logging.$METHOD(...)
                      ...
