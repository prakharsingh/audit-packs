rules:
  - id: hardcoded-credential
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded credential detected. Embedding secrets in source code violates
      authenticator management controls (NIST IA-5 / SOC 2 CC6.4).
    patterns:
      - pattern-either:
          # Common password / secret keyword patterns
          - patterns:
              - pattern: |
                  $VAR = "..."
              - pattern-inside: |
                  $VAR = "..."
              - pattern-regex: '(?i)(password|passwd|secret|api_key|apikey|auth_token|access_key)\s*=\s*"[^"]{4,}"'
          # AWS access key literal pattern
          - pattern-regex: '(?:AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'
          # Generic assignment with credential keyword
          - patterns:
              - pattern: $VAR = $SECRET
              - metavariable-regex:
                  metavariable: $VAR
                  regex: '(?i)(password|passwd|secret|api_key|access_key|auth_token)'
              - metavariable-regex:
                  metavariable: $SECRET
                  regex: '"[^"]{4,}"'
