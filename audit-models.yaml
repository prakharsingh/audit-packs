# Default model routing for audit-packs.
# Supports providers: openai, anthropic, google, ollama, openai-compatible
# Override any role with env vars: DETECTOR_MODEL, VERIFIER_MODEL, CHALLENGER_MODEL, CONSENSUS_MODEL
models:
  detector:
    provider: openai
    model: gpt-4o
    base_url: null
    api_key_env: OPENAI_API_KEY

  verifier:
    provider: anthropic
    model: claude-opus-4-5
    base_url: null
    api_key_env: ANTHROPIC_API_KEY

  challenger:
    provider: google
    model: gemini-1.5-pro
    base_url: null
    api_key_env: GOOGLE_API_KEY

  consensus:
    provider: openai
    model: gpt-4o
    base_url: null
    api_key_env: OPENAI_API_KEY
