[tool.uv.workspace]
members = [
    "packages/core",
    "packages/mapping",
    "packages/evidence",
    "packages/ai",
    "packages/action",
]

[tool.uv.sources]
audit-packs-core = { workspace = true }
audit-packs-mapping = { workspace = true }
audit-packs-evidence = { workspace = true }
audit-packs-ai = { workspace = true }
audit-packs = { workspace = true }

[tool.uv]
link-mode = "copy"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
    "packages/core/src",
    "packages/mapping/src",
    "packages/evidence/src",
    "packages/ai/src",
    "packages/action/src",
]

[tool.ruff]
exclude = ["real_world_fixtures"]

[tool.semantic_release]
version_variables = ["packages/action/src/audit_packs_action/__init__.py:__version__"]
version_toml = ["packages/action/pyproject.toml:project.version"]
commit_parser = "conventional"
allow_zero_version = true
build_command = "pip install build && cd packages/action && python -m build . --outdir ../../dist"
upload_to_pypi = false

[tool.semantic_release.changelog]
exclude_commit_patterns = []

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
]
