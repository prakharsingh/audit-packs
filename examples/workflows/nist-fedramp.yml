# NIST 800-53 + FedRAMP Moderate — for federal and GovTech workloads.
# Strict gate: blocks on medium severity and above.
# Uploads OSCAL assessment-results for FedRAMP evidence package assembly.
name: Compliance Audit — NIST 800-53 + FedRAMP

on:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prakharsingh/audit-packs@v1
        id: audit
        with:
          frameworks: |
            nist-800-53
            fedramp
          fail-on: medium     # FedRAMP typically requires a stricter gate
          scan-mode: both
          emit-oscal: true
          emit-coverage: true
          emit-sarif: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.audit.outputs.sarif-path }}

      # Retain OSCAL JSON as a long-lived compliance artifact.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fedramp-oscal-${{ github.run_number }}
          path: |
            ${{ steps.audit.outputs.oscal-path }}
            ${{ steps.audit.outputs.coverage-md-path }}
            ${{ steps.audit.outputs.coverage-html-path }}
          retention-days: 365
